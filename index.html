<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>福寿 営業準備シート</title>
<style>
  :root {
    --primary: #1a3a4a;
    --primary-light: #2a5a6a;
    --accent: #8b6914;
    --bg: #f7f5f0;
    --card-bg: #ffffff;
    --border: #d4cfc5;
    --text: #2c2c2c;
    --text-light: #5a5a5a;
    --section-bg: #faf8f4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
  }

  .header {
    background: var(--primary);
    color: #fff;
    padding: 16px 24px;
    text-align: center;
    border-bottom: 3px solid var(--accent);
  }

  .header h1 {
    font-size: 1.4rem;
    font-weight: 600;
    letter-spacing: 0.1em;
  }

  .header .sub {
    font-size: 0.8rem;
    opacity: 0.8;
    margin-top: 2px;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  /* --- フォーム --- */
  .form-section {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 20px;
  }

  .form-section h2 {
    font-size: 1rem;
    color: var(--primary);
    border-left: 4px solid var(--accent);
    padding-left: 10px;
    margin-bottom: 16px;
  }

  .form-group {
    margin-bottom: 14px;
  }

  .form-group label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 4px;
    color: var(--primary);
  }

  .form-group input[type="text"],
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.95rem;
    font-family: inherit;
    background: #fff;
    transition: border-color 0.2s;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: var(--primary-light);
    box-shadow: 0 0 0 2px rgba(26, 58, 74, 0.1);
  }

  .form-group textarea {
    height: 80px;
    resize: vertical;
  }

  .product-category-label {
    font-size: 0.82rem;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
    display: block;
  }

  .checkbox-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 8px;
  }

  .checkbox-grid label {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-weight: 400;
    font-size: 0.88rem;
    cursor: pointer;
    padding: 6px 4px;
    border-radius: 4px;
    -webkit-tap-highlight-color: transparent;
  }

  .checkbox-grid label:active {
    background: rgba(26, 58, 74, 0.05);
  }

  .checkbox-grid input[type="checkbox"] {
    accent-color: var(--primary);
    width: 18px;
    height: 18px;
    min-width: 18px;
    margin-top: 1px;
  }

  .btn {
    display: inline-block;
    padding: 12px 32px;
    border: none;
    border-radius: 6px;
    font-size: 1rem;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .btn:active { transform: scale(0.98); }

  .btn-primary {
    background: var(--primary);
    color: #fff;
    width: 100%;
    margin-top: 8px;
  }

  .btn-primary:hover { background: var(--primary-light); }

  .btn-secondary {
    background: #e8e4dc;
    color: var(--text);
    margin-right: 8px;
  }

  .btn-secondary:hover { background: #ddd8ce; }

  .btn-print {
    background: var(--accent);
    color: #fff;
  }

  .btn-print:hover { background: #a07a18; }

  .error-msg {
    color: #c0392b;
    font-size: 0.82rem;
    margin-top: 4px;
    display: none;
  }

  /* --- 結果画面 --- */
  #result-view { display: none; }

  .result-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .sheet {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .sheet-header {
    background: var(--primary);
    color: #fff;
    padding: 20px 24px;
  }

  .sheet-header h2 {
    font-size: 1.2rem;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .sheet-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 16px;
    font-size: 0.85rem;
    opacity: 0.9;
  }

  .sheet-section {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }

  .sheet-section:last-child { border-bottom: none; }

  .sheet-section h3 {
    font-size: 0.95rem;
    color: var(--primary);
    border-bottom: 2px solid var(--accent);
    padding-bottom: 6px;
    margin-bottom: 12px;
  }

  .sheet-section p,
  .sheet-section li {
    font-size: 0.9rem;
    line-height: 1.8;
    color: var(--text);
  }

  .sheet-section ul,
  .sheet-section ol {
    padding-left: 20px;
  }

  .sheet-section li { margin-bottom: 6px; }

  .product-card {
    background: var(--section-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }

  .product-card h4 {
    font-size: 0.9rem;
    color: var(--primary);
    margin-bottom: 6px;
  }

  .product-card p {
    font-size: 0.85rem;
    color: var(--text-light);
  }

  .keyword-list {
    list-style: none;
    padding: 0;
    counter-reset: kw;
  }

  .keyword-list li {
    counter-increment: kw;
    padding: 10px 14px;
    background: var(--section-bg);
    border-left: 3px solid var(--accent);
    margin-bottom: 8px;
    border-radius: 0 6px 6px 0;
  }

  .keyword-list li::before {
    content: counter(kw) ". ";
    font-weight: 700;
    color: var(--accent);
  }

  .qa-item {
    margin-bottom: 14px;
  }

  .qa-item .q {
    font-weight: 700;
    color: var(--primary);
    font-size: 0.9rem;
    margin-bottom: 4px;
  }

  .qa-item .q::before { content: "Q："; }

  .qa-item .a {
    font-size: 0.85rem;
    color: var(--text-light);
    padding-left: 24px;
  }

  .qa-item .a::before {
    content: "A：";
    font-weight: 600;
    color: var(--text);
  }

  .memo-area {
    border: 2px dashed var(--border);
    border-radius: 6px;
    min-height: 160px;
    padding: 12px;
    background: #fdfcfa;
  }

  .memo-area p {
    font-size: 0.8rem;
    color: #aaa;
  }

  /* --- レスポンシブ --- */
  @media (max-width: 768px) {
    .checkbox-grid { grid-template-columns: 1fr; }
  }

  @media (max-width: 600px) {
    .container { padding: 16px 10px; }
    .form-section { padding: 14px; }
    .sheet-meta { grid-template-columns: 1fr; }
    .sheet-section { padding: 14px; }
    .sheet-header { padding: 16px; }
    .result-actions { flex-direction: column; }
    .btn { width: 100%; text-align: center; }

    .form-group input[type="text"],
    .form-group select,
    .form-group textarea {
      font-size: 16px;
    }

    .header h1 { font-size: 1.2rem; }

    .qa-item .a { padding-left: 0; }
  }

  /* --- 印刷 --- */
  @media print {
    body { background: #fff; }
    .header { padding: 10px; border-bottom: 2px solid #333; background: #fff; color: #000; }
    .header .sub { display: none; }
    #form-view, .result-actions, .no-print { display: none !important; }
    #result-view { display: block !important; }
    .container { padding: 0; max-width: 100%; }
    .sheet { border: none; border-radius: 0; }
    .sheet-header { background: #fff; color: #000; border-bottom: 2px solid #000; padding: 12px 16px; }
    .sheet-section { padding: 14px 16px; border-bottom: 1px solid #ccc; }
    .sheet-section h3 { border-bottom-color: #333; }
    .product-card { background: #f5f5f5; border-color: #ccc; }
    .keyword-list li { background: #f5f5f5; border-left-color: #333; }
    .memo-area { min-height: 120px; border-color: #999; }
    .btn { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>福寿 営業準備シート</h1>
  <div class="sub">株式会社浅利佐助商店 ｜ 創業明治5年</div>
</div>

<div class="container">

  <!-- 入力フォーム -->

      </div>

      <div class="form-group">
        <label for="bizType">訪問先の業態 <span style="color:#c0392b">*</span></label>
        <select id="bizType">
          <option value="">選択してください</option>
          <option value="super">スーパー・食料品店</option>
          <option value="restaurant">飲食店・レストラン</option>
          <option value="hotel">ホテル・旅館</option>
          <option value="michinoeki">道の駅・観光施設</option>
          <option value="tonya">問屋</option>
          <option value="wholesale">業務用食品卸</option>
          <option value="udon">うどん製造会社</option>
          <option value="ec">EC・オンライン販売</option>
          <option value="other">その他</option>
        </select>
        <div class="error-msg" id="err-bizType">業態を選択してください</div>
      </div>

      <div class="form-group">
        <label for="scale">訪問先の規模</label>
        <select id="scale">
          <option value="small">個人店・小規模</option>
          <option value="medium">中規模（〜50席/店舗）</option>
          <option value="large">大規模・チェーン</option>
        </select>
      </div>

      <div class="form-group">
        <label for="area">訪問先のエリア</label>
        <input type="text" id="area" placeholder="例：秋田市中心部">
      </div>

      <div class="form-group">
        <label for="staffName">訪問担当者名</label>
        <input type="text" id="staffName" placeholder="例：佐藤">
      </div>

      <div class="form-group">
        <label for="purpose">訪問目的</label>
        <select id="purpose">
          <option value="new">新規開拓</option>
          <option value="follow">既存顧客フォロー</option>

    </div>

          <label><input type="checkbox" name="product" value="amakuchi"> 福寿 甘口醤油</label>
          <label><input type="checkbox" name="product" value="usukuchi"> 福寿 淡口醤油</label>
        </div>
      </div>

      <div class="form-group">
        <label class="product-category-label">味噌・調味味噌</label>

          <label><input type="checkbox" name="product" value="genen-miso"> おいしい減塩生みそ</label>

      </div>

      <div class="form-group">
        <label class="product-category-label">つゆ・だし</label>
        <div class="checkbox-grid">
          <label><input type="checkbox" name="product" value="tarekko"> たれっこ</label>
          <label><input type="checkbox" name="product" value="washoku-no-moto"> 和食の素</label>
          <label><input type="checkbox" name="product" value="konbu-shirodashi"> 昆布白だし</label>

      </div>

      <div class="form-group">
        <label class="product-category-label">比内地鶏スープ・つゆ</label>
        <div class="checkbox-grid">
          <label><input type="checkbox" name="product" value="hinai-soup"> 比内地鶏スープ</label>

        <div class="checkbox-grid">
          <label><input type="checkbox" name="product" value="hanawa-su"> 花輪酢</label>
          <label><input type="checkbox" name="product" value="butadon-uma"> 福寿 豚丼のたれ（旨だれ）</label>
          <label><input type="checkbox" name="product" value="butadon-kara"> 福寿 豚丼のたれ（辛口にんにく）</label>

          <label><input type="checkbox" name="product" value="amakara-daikon"> 甘辛大根漬け</label>
        </div>
      </div>

      <div class="error-msg" id="err-product">提案商品を1つ以上選択してください</div>
    </div>

    <div class="form-section">
      <h2>訪問先について気になること（任意）</h2>
      <div class="form-group">
        <textarea id="notes" placeholder="例：最近地産地消に力を入れているらしい、新メニュー開発中とのこと"></textarea>
      </div>
    </div>

    <button class="btn btn-primary" onclick="generate()">準備シートを生成する</button>
  </div>

  <!-- 結果画面 -->
  <div id="result-view">
    <div class="result-actions no-print">
      <button class="btn btn-secondary" onclick="backToForm()">最初からやり直す</button>
      <button class="btn btn-print" onclick="window.print()">印刷する</button>
    </div>
    <div class="sheet" id="sheet"></div>
  </div>

</div>

// --- ユーティリティ ---
function getToday() {
  const d = new Date();
  return d.getFullYear() + "年" + (d.getMonth() + 1) + "月" + d.getDate() + "日";
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

// --- バリデーション ---
function validate() {
  let ok = true;
  const name = document.getElementById("clientName").value.trim();
  const biz = document.getElementById("bizType").value;
  const products = document.querySelectorAll('input[name="product"]:checked');

  document.getElementById("err-clientName").style.display = name ? "none" : "block";
  document.getElementById("err-bizType").style.display = biz ? "none" : "block";
  document.getElementById("err-product").style.display = products.length > 0 ? "none" : "block";

  if (!name || !biz || products.length === 0) ok = false;
  return ok;
}

// --- 生成 ---
function generate() {
  if (!validate()) return;

  const clientName = escapeHtml(document.getElementById("clientName").value.trim());
  const bizType = document.getElementById("bizType").value;
  const scale = document.getElementById("scale").value;
  const area = escapeHtml(document.getElementById("area").value.trim() || "―");
  const staffName = escapeHtml(document.getElementById("staffName").value.trim() || "―");
  const purpose = document.getElementById("purpose").value;
  const notes = escapeHtml(document.getElementById("notes").value.trim());
  const selectedProducts = Array.from(document.querySelectorAll('input[name="product"]:checked')).map(cb => cb.value);

  const bizLabel = BIZ_LABELS[bizType];
  const scaleLabel = SCALE_LABELS[scale];
  const purposeLabel = PURPOSE_LABELS[purpose];

  // セクション1: プロファイル
  const profile = PROFILES[bizType][scale];

  // セクション2: 提案商品
  let productsHtml = "";
  selectedProducts.forEach(pid => {
    const info = PRODUCT_INFO[pid];
    const reason = PRODUCT_REASONS[pid][bizType];
    productsHtml += `
      <div class="product-card">
        <h4>${info.name}</h4>
        <p style="margin-bottom:6px;font-size:0.82rem;color:#888;">${info.desc}</p>
        <p>${reason}</p>
      </div>`;
  });

  // セクション3: キーワード
  const keywords = KEYWORDS_DB[bizType][purpose];
  let kwHtml = "";
  keywords.forEach(kw => {
    kwHtml += `<li>${kw}</li>`;
  });

  // セクション4: Q&A
  const qaList = QA_DB[bizType];
  let qaHtml = "";
  qaList.forEach(item => {
    qaHtml += `
      <div class="qa-item">
        <div class="q">${item.q}</div>
        <div class="a">${item.a}</div>
      </div>`;
  });

  // メモ（気になること）
  let notesSection = "";
  if (notes) {
    notesSection = `<p style="background:var(--section-bg);padding:10px 14px;border-radius:6px;font-size:0.88rem;border-left:3px solid var(--accent);margin-bottom:8px;">${notes}</p>`;
  }

  // シート組み立て
  const html = `
    <div class="sheet-header">
      <h2>商談準備シート</h2>
      <div class="sheet-meta">
        <div>訪問先：${clientName}</div>
        <div>業態：${bizLabel}（${scaleLabel}）</div>
        <div>訪問日：${getToday()}</div>
        <div>担当：${staffName}</div>
        <div>エリア：${area}</div>
        <div>目的：${purposeLabel}</div>
      </div>
    </div>

    <div class="sheet-section">
      <h3>1. 訪問先プロファイル</h3>
      <p>${profile}</p>
      ${notes ? '<h3 style="margin-top:14px;font-size:0.88rem;border-bottom:1px dashed var(--border);padding-bottom:4px;">事前メモ</h3>' + notesSection : ""}
    </div>

    <div class="sheet-section">
      <h3>2. おすすめ提案商品と推奨理由</h3>
      ${productsHtml}
    </div>

    <div class="sheet-section">
      <h3>3. 商談で強調すべきキーワード Top3</h3>
      <ul class="keyword-list">
        ${kwHtml}
      </ul>
    </div>

    <div class="sheet-section">
      <h3>4. 想定される質問と回答例</h3>
      ${qaHtml}
    </div>

    <div class="sheet-section">
      <h3>5. 商談メモ欄</h3>
      <div class="memo-area">
        <p>（商談中のメモにお使いください）</p>
      </div>
    </div>
  `;

  document.getElementById("sheet").innerHTML = html;
  document.getElementById("form-view").style.display = "none";
  document.getElementById("result-view").style.display = "block";
  window.scrollTo(0, 0);
}

function backToForm() {
  document.getElementById("form-view").style.display = "block";
  document.getElementById("result-view").style.display = "none";
  window.scrollTo(0, 0);
}
</script>
